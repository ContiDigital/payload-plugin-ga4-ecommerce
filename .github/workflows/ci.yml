name: CI

on:
  pull_request:
    branches:
      - main
      - master
      - release/*
  push:
    branches:
      - main
      - master
      - release/*
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18
          - 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: ${{ matrix.node-version }}

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint Source
        run: pnpm exec eslint src --max-warnings=0

      - name: Run Integration and Unit Tests
        run: pnpm test:int

      - name: Coverage
        if: matrix.node-version == 20
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Pack Install Smoke Test
        run: pnpm pack:smoke

  ga4-live-smoke:
    name: GA4 Live Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 20

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Check required secrets
        id: secret-check
        run: |
          if [ -n "${GA4_PROPERTY_ID}" ] && [ -n "${GA4_CREDENTIALS_JSON}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GA4_CREDENTIALS_JSON: ${{ secrets.GA4_CREDENTIALS_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}

      - name: Skip GA4 live smoke (secrets missing)
        if: steps.secret-check.outputs.enabled != 'true'
        run: echo "GA4 live smoke skipped — secrets are not configured."

      - name: Prepare GA4 Credentials
        if: steps.secret-check.outputs.enabled == 'true'
        run: |
          mkdir -p dev
          printf '%s' "${GA4_CREDENTIALS_JSON}" > dev/.google-credentials.json
        env:
          GA4_CREDENTIALS_JSON: ${{ secrets.GA4_CREDENTIALS_JSON }}

      - name: Run GA4 Live Smoke
        if: steps.secret-check.outputs.enabled == 'true'
        run: node ./scripts/ga4-live-smoke.mjs
        env:
          GA4_CREDENTIALS_PATH: ./dev/.google-credentials.json
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}

      - name: Cleanup GA4 Credentials
        if: always()
        run: rm -f dev/.google-credentials.json
